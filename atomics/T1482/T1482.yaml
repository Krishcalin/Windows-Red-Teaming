attack_technique: T1482
display_name: "Domain Trust Discovery"
tactic: Discovery
atomic_tests:
  - name: "Domain Trust Enumeration via nltest"
    auto_generated_guid: b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2
    description: |
      Uses nltest to enumerate domain trusts.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        nltest /domain_trusts /all_trusts
        nltest /dclist:
        nltest /dsgetsite
      elevation_required: false

  - name: "Domain Trust via PowerShell"
    auto_generated_guid: c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3
    description: |
      Uses .NET DirectoryServices to discover domain trusts.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        ([System.DirectoryServices.ActiveDirectory.Domain]::GetCurrentDomain()).GetAllTrustRelationships() | Format-Table -AutoSize
        ([System.DirectoryServices.ActiveDirectory.Forest]::GetCurrentForest()).GetAllTrustRelationships() | Format-Table -AutoSize
      elevation_required: false

  - name: "Domain Controller Discovery"
    auto_generated_guid: d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4
    description: |
      Enumerates domain controllers in the current domain.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        [System.DirectoryServices.ActiveDirectory.Domain]::GetCurrentDomain().DomainControllers | Select-Object Name,IPAddress,OSVersion,SiteName
      elevation_required: false
