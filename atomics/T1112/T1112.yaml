attack_technique: T1112
display_name: "Modify Registry"
tactic: Defense Evasion
atomic_tests:
  - name: "Modify Registry via reg.exe"
    auto_generated_guid: b4b4c4d4e4f4a5b5c5d5e5f5a6b6c6d6
    description: |
      Creates and modifies registry values using reg.exe.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        reg add "HKCU\SOFTWARE\AtomicRedTeam" /v TestValue /t REG_SZ /d "AtomicTest" /f
        reg query "HKCU\SOFTWARE\AtomicRedTeam"
      cleanup_command: |
        reg delete "HKCU\SOFTWARE\AtomicRedTeam" /f >nul 2>&1
      elevation_required: false

  - name: "Disable UAC via Registry"
    auto_generated_guid: c5c5d5e5f5a6b6c6d6e6f6a7b7c7d7e7
    description: |
      Disables UAC remote restrictions via registry modification.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" /v LocalAccountTokenFilterPolicy /t REG_DWORD /d 1 /f
      cleanup_command: |
        reg delete "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" /v LocalAccountTokenFilterPolicy /f >nul 2>&1
      elevation_required: true

  - name: "Disable Windows Defender via Registry"
    auto_generated_guid: d6d6e6f6a7b7c7d7e7f7a8b8c8d8e8f8
    description: |
      Sets multiple registry keys to disable Windows Defender features.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection" /v DisableRealtimeMonitoring /t REG_DWORD /d 1 /f
        reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection" /v DisableBehaviorMonitoring /t REG_DWORD /d 1 /f
        reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Spynet" /v SubmitSamplesConsent /t REG_DWORD /d 0 /f
      cleanup_command: |
        reg delete "HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection" /v DisableRealtimeMonitoring /f >nul 2>&1
        reg delete "HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection" /v DisableBehaviorMonitoring /f >nul 2>&1
        reg delete "HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Spynet" /v SubmitSamplesConsent /f >nul 2>&1
      elevation_required: true

  - name: "Enable WDigest Credential Caching"
    auto_generated_guid: e7e7f7a8b8c8d8e8f8a9b9c9d9e9f9a0
    description: |
      Enables WDigest authentication to cache cleartext credentials in memory.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest" /v UseLogonCredential /t REG_DWORD /d 1 /f
      cleanup_command: |
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest" /v UseLogonCredential /t REG_DWORD /d 0 /f
      elevation_required: true
