attack_technique: T1049
display_name: "System Network Connections Discovery"
tactic: Discovery
atomic_tests:
  - name: "Active Network Connections via netstat"
    auto_generated_guid: d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7
    description: |
      Uses netstat to display all active TCP connections with PIDs.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        netstat -ano
      elevation_required: false

  - name: "Established Connections via PowerShell"
    auto_generated_guid: e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8
    description: |
      Uses Get-NetTCPConnection to find established connections.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-NetTCPConnection -State Established | Select-Object LocalAddress,LocalPort,RemoteAddress,RemotePort,OwningProcess,@{Name='Process';Expression={(Get-Process -Id $_.OwningProcess -ErrorAction SilentlyContinue).ProcessName}} | Sort-Object RemoteAddress
      elevation_required: false

  - name: "UDP Connections Discovery"
    auto_generated_guid: f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9
    description: |
      Enumerates UDP endpoint connections.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-NetUDPEndpoint | Select-Object LocalAddress,LocalPort,OwningProcess,@{Name='Process';Expression={(Get-Process -Id $_.OwningProcess -ErrorAction SilentlyContinue).ProcessName}}
      elevation_required: false
