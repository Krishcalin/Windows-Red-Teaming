attack_technique: T1057
display_name: "Process Discovery"
tactic: Discovery
atomic_tests:
  - name: "Process Listing via tasklist"
    auto_generated_guid: a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8
    description: |
      Uses tasklist to enumerate running processes with PIDs.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        tasklist /v
      elevation_required: false

  - name: "Process Discovery via PowerShell"
    auto_generated_guid: b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9
    description: |
      Uses Get-Process for detailed process enumeration.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-Process | Select-Object Id,ProcessName,Path,Company,CPU,WorkingSet64 | Sort-Object CPU -Descending | Select-Object -First 30
      elevation_required: false

  - name: "Security Product Process Discovery"
    auto_generated_guid: c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0
    description: |
      Searches for known security product processes (AV, EDR, SIEM agents).
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $secProcs = @("MsMpEng","MsSense","SenseIR","SenseNdr","csfalconservice","CSFalconService","cb","CbDefense","CylanceSvc","SentinelAgent","SentinelOne","TaniumClient","lacuna","xagt","fmon","bdservicehost","avp","savservice","mfetp","mfemactl","CrowdStrike","Elastic.Agent","winlogbeat","nxlog","ossec")
        Get-Process | Where-Object { $secProcs -contains $_.ProcessName } | Select-Object Id,ProcessName,Path
      elevation_required: false

  - name: "Process Discovery via WMI"
    auto_generated_guid: d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1
    description: |
      Uses WMI to enumerate processes with command lines.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-CimInstance Win32_Process | Select-Object ProcessId,Name,ExecutablePath,CommandLine | Where-Object { $_.CommandLine } | Select-Object -First 30
      elevation_required: false
