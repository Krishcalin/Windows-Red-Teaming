attack_technique: T1105
display_name: "Ingress Tool Transfer"
tactic: Command and Control
atomic_tests:
  - name: "File Download via PowerShell WebClient"
    auto_generated_guid: d8d8e8f8a9b9c9d9e9f9a0b0c0d0e0f0
    description: |
      Downloads a file using PowerShell .NET WebClient.
    supported_platforms:
      - windows
    input_arguments:
      url:
        description: "URL to download"
        type: url
        default: "https://raw.githubusercontent.com/redcanaryco/atomic-red-team/master/LICENSE.txt"
      output_path:
        description: "Output file path"
        type: path
        default: "%TEMP%\\atomic_download.txt"
    executor:
      name: powershell
      command: |
        (New-Object Net.WebClient).DownloadFile("#{url}", "#{output_path}")
        if (Test-Path "#{output_path}") { Write-Output "Downloaded to: #{output_path}" }
      cleanup_command: |
        Remove-Item "#{output_path}" -Force -ErrorAction SilentlyContinue
      elevation_required: false

  - name: "File Download via Invoke-WebRequest"
    auto_generated_guid: e9e9f9a0b0c0d0e0f0a1b1c1d1e1f1a2
    description: |
      Downloads a file using PowerShell Invoke-WebRequest.
    supported_platforms:
      - windows
    input_arguments:
      url:
        description: "URL to download"
        type: url
        default: "https://raw.githubusercontent.com/redcanaryco/atomic-red-team/master/LICENSE.txt"
      output_path:
        description: "Output path"
        type: path
        default: "%TEMP%\\atomic_iwr.txt"
    executor:
      name: powershell
      command: |
        Invoke-WebRequest -Uri "#{url}" -OutFile "#{output_path}"
        if (Test-Path "#{output_path}") { Write-Output "Downloaded to: #{output_path}" }
      cleanup_command: |
        Remove-Item "#{output_path}" -Force -ErrorAction SilentlyContinue
      elevation_required: false

  - name: "File Download via certutil"
    auto_generated_guid: f0f0a1b1c1d1e1f1a2b2c2d2e2f2a3b3
    description: |
      Uses certutil.exe to download files (common LOLBin technique).
    supported_platforms:
      - windows
    input_arguments:
      url:
        description: "URL to download"
        type: url
        default: "https://raw.githubusercontent.com/redcanaryco/atomic-red-team/master/LICENSE.txt"
      output_path:
        description: "Output path"
        type: path
        default: "%TEMP%\\atomic_certutil.txt"
    executor:
      name: command_prompt
      command: |
        certutil -urlcache -split -f "#{url}" #{output_path}
        certutil -urlcache -split -f "#{url}" delete
      cleanup_command: |
        del /f #{output_path} >nul 2>&1
      elevation_required: false

  - name: "File Download via bitsadmin"
    auto_generated_guid: a1a1b1c1d1e1f1a2b2c2d2e2f2a3b3c3
    description: |
      Uses BITS to download files in the background.
    supported_platforms:
      - windows
    input_arguments:
      url:
        description: "URL to download"
        type: url
        default: "https://raw.githubusercontent.com/redcanaryco/atomic-red-team/master/LICENSE.txt"
      output_path:
        description: "Output path"
        type: path
        default: "%TEMP%\\atomic_bits.txt"
    executor:
      name: command_prompt
      command: |
        bitsadmin /transfer AtomicDownload /download /priority high "#{url}" #{output_path}
      cleanup_command: |
        del /f #{output_path} >nul 2>&1
        bitsadmin /cancel AtomicDownload >nul 2>&1
      elevation_required: false

  - name: "File Download via curl (Windows 10+)"
    auto_generated_guid: b2b2c2d2e2f2a3b3c3d3e3f3a4b4c4d4
    description: |
      Uses built-in curl.exe to download files.
    supported_platforms:
      - windows
    input_arguments:
      url:
        description: "URL to download"
        type: url
        default: "https://raw.githubusercontent.com/redcanaryco/atomic-red-team/master/LICENSE.txt"
      output_path:
        description: "Output path"
        type: path
        default: "%TEMP%\\atomic_curl.txt"
    executor:
      name: command_prompt
      command: |
        curl.exe -o #{output_path} "#{url}"
      cleanup_command: |
        del /f #{output_path} >nul 2>&1
      elevation_required: false
