attack_technique: T1124
display_name: "System Time Discovery"
tactic: Discovery
atomic_tests:
  - name: "System Time Discovery via Various Methods"
    auto_generated_guid: f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8
    description: |
      Discovers system time and timezone via multiple methods.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        time /t
        w32tm /tz
        net time
      elevation_required: false

  - name: "NTP Configuration Discovery"
    auto_generated_guid: a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9
    description: |
      Enumerates NTP configuration and time synchronization status.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        w32tm /query /status
        w32tm /query /peers
      elevation_required: false
