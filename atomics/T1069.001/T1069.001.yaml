attack_technique: T1069.001
display_name: "Permission Groups Discovery: Local Groups"
tactic: Discovery
atomic_tests:
  - name: "Enumerate Local Groups via net localgroup"
    auto_generated_guid: f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6
    description: |
      Uses net localgroup to enumerate all local groups.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        net localgroup
      elevation_required: false

  - name: "Enumerate Local Administrators Group"
    auto_generated_guid: a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7
    description: |
      Lists members of the local Administrators group.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        net localgroup Administrators
      elevation_required: false

  - name: "Enumerate Local Groups via PowerShell"
    auto_generated_guid: b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8
    description: |
      Uses Get-LocalGroup and Get-LocalGroupMember for detailed enumeration.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-LocalGroup | ForEach-Object { Write-Output "`n--- $($_.Name) ---"; Get-LocalGroupMember -Group $_.Name -ErrorAction SilentlyContinue | Select-Object Name,ObjectClass,PrincipalSource }
      elevation_required: false

  - name: "Enumerate Remote Desktop Users Group"
    auto_generated_guid: c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9
    description: |
      Lists members of the Remote Desktop Users group.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        net localgroup "Remote Desktop Users"
      elevation_required: false
