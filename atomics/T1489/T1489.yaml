attack_technique: T1489
display_name: "Service Stop"
tactic: Impact
atomic_tests:
  - name: "Stop Windows Update Service"
    auto_generated_guid: b8b8c8d8e8f8a9b9c9d9e9f9a0b0c0d0
    description: |
      Stops the Windows Update service (wuauserv).
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        sc query wuauserv
        net stop wuauserv
        sc query wuauserv
      cleanup_command: |
        net start wuauserv >nul 2>&1
      elevation_required: true

  - name: "Stop Critical Services (Enumeration Only)"
    auto_generated_guid: c9c9d9e9f9a0b0c0d0e0f0a1b1c1d1e1
    description: |
      Enumerates critical services that ransomware typically targets.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $targetServices = @("MSSQLSERVER","SQLAgent","SQLBrowser","MSSQL`$*","MySQL","postgresql","MongoDB","vss","wbengine","SstpSvc","vmicvss","swprv","MSExchangeIS","MSExchangeTransport","W3SVC","IISADMIN","Apache","Tomcat")
        foreach ($svc in $targetServices) { Get-Service -Name $svc -ErrorAction SilentlyContinue | Select-Object Name,DisplayName,Status }
      elevation_required: false
