attack_technique: T1021.006
display_name: "Remote Services: Windows Remote Management"
tactic: Lateral Movement
atomic_tests:
  - name: "WinRM Configuration Audit"
    auto_generated_guid: a9a9b9c9d9e9f9a0b0c0d0e0f0a1b1c1
    description: |
      Checks WinRM configuration for remote access settings.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Test-WSMan -ErrorAction SilentlyContinue
        Get-Item WSMan:\localhost\Service\AllowUnencrypted -ErrorAction SilentlyContinue
        Get-Item WSMan:\localhost\Service\Auth\* -ErrorAction SilentlyContinue
        Get-Item WSMan:\localhost\Client\TrustedHosts -ErrorAction SilentlyContinue
      elevation_required: false

  - name: "Enable WinRM Service"
    auto_generated_guid: b0b0c0d0e0f0a1b1c1d1e1f1a2b2c2d2
    description: |
      Enables and configures WinRM for remote management.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Enable-PSRemoting -Force -SkipNetworkProfileCheck
        Set-Item WSMan:\localhost\Client\TrustedHosts -Value "*" -Force
        Get-Service WinRM | Select-Object Name,Status
      cleanup_command: |
        Set-Item WSMan:\localhost\Client\TrustedHosts -Value "" -Force
      elevation_required: true

  - name: "WinRM Remote Command Execution"
    auto_generated_guid: c1c1d1e1f1a2b2c2d2e2f2a3b3c3d3e3
    description: |
      Executes a command on a remote system via WinRM.
    supported_platforms:
      - windows
    input_arguments:
      target_host:
        description: "Target hostname"
        type: string
        default: "localhost"
    executor:
      name: powershell
      command: |
        Invoke-Command -ComputerName #{target_host} -ScriptBlock { whoami; hostname } -ErrorAction SilentlyContinue
      elevation_required: false
