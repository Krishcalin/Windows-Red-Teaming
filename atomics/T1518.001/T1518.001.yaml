attack_technique: T1518.001
display_name: "Software Discovery: Security Software Discovery"
tactic: Discovery
atomic_tests:
  - name: "Security Software Discovery via WMI"
    auto_generated_guid: e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1
    description: |
      Enumerates installed security products via WMI SecurityCenter2.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-CimInstance -Namespace root/SecurityCenter2 -ClassName AntiVirusProduct -ErrorAction SilentlyContinue | Select-Object displayName,pathToSignedProductExe,productState
        Get-CimInstance -Namespace root/SecurityCenter2 -ClassName FirewallProduct -ErrorAction SilentlyContinue | Select-Object displayName,pathToSignedProductExe
      elevation_required: false

  - name: "Windows Defender Configuration Enumeration"
    auto_generated_guid: f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2
    description: |
      Enumerates Windows Defender settings and exclusions.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-MpPreference | Select-Object DisableRealtimeMonitoring,DisableBehaviorMonitoring,ExclusionPath,ExclusionExtension,ExclusionProcess
        Get-MpComputerStatus | Select-Object AMServiceEnabled,AntispywareEnabled,AntivirusEnabled,RealTimeProtectionEnabled
      elevation_required: false

  - name: "EDR and SIEM Agent Discovery"
    auto_generated_guid: a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3
    description: |
      Searches for common EDR, SIEM, and security agent services.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $svcPatterns = @("CrowdStrike","Falcon","Carbon","CbDefense","Cylance","Sentinel","Tanium","Elastic","Winlogbeat","nxlog","OSSEC","Wazuh","Splunk","QualysAgent","Rapid7","Defender","MsSense","SenseIR")
        Get-Service | Where-Object { $svc = $_.Name; $svcPatterns | Where-Object { $svc -like "*$_*" } } | Select-Object Name,DisplayName,Status
      elevation_required: false

  - name: "AppLocker Policy Discovery"
    auto_generated_guid: b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4
    description: |
      Enumerates AppLocker policies and WDAC status.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-AppLockerPolicy -Effective -ErrorAction SilentlyContinue | Select-Object -ExpandProperty RuleCollections
        Get-CimInstance -ClassName Win32_DeviceGuard -Namespace root/Microsoft/Windows/DeviceGuard -ErrorAction SilentlyContinue | Select-Object CodeIntegrityPolicyEnforcementStatus,UsermodeCodeIntegrityPolicyEnforcementStatus
      elevation_required: false
