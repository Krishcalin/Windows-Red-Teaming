attack_technique: T1003.004
display_name: "OS Credential Dumping: LSA Secrets"
tactic: Credential Access
atomic_tests:
  - name: "LSA Protection (RunAsPPL) Status Check"
    auto_generated_guid: b1c1d1e1f1a2b2c2d2e2f2a3b3c3d3e3
    description: |
      Reports whether LSA protection (RunAsPPL) is enabled. When disabled,
      LSA secrets stored under HKLM\SECURITY\Policy\Secrets are easier to
      extract by a SYSTEM-level attacker.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $ppl = (Get-ItemProperty 'HKLM:\SYSTEM\CurrentControlSet\Control\Lsa' -Name RunAsPPL -ErrorAction SilentlyContinue).RunAsPPL
        Write-Output "RunAsPPL: $(if ($ppl -in 1,2) {"Enabled ($ppl)"} else {'Disabled'})"
      elevation_required: false

  - name: "WDigest Cleartext Credential Caching Check"
    auto_generated_guid: c2d2e2f2a3b3c3d3e3f3a4b4c4d4e4f4
    description: |
      Checks the WDigest UseLogonCredential value. When set to 1, cleartext
      credentials are cached and recoverable as LSA secrets.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $w = (Get-ItemProperty 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest' -Name UseLogonCredential -ErrorAction SilentlyContinue).UseLogonCredential
        Write-Output "WDigest UseLogonCredential: $(if ($w -eq 1) {'Enabled (cleartext cached)'} else {'Disabled'})"
      elevation_required: false

  - name: "Auto-Logon Secret Enumeration"
    auto_generated_guid: d3e3f3a4b4c4d4e4f4a5b5c5d5e5f5a6
    description: |
      Detects an auto-logon password stored in the Winlogon registry key,
      which Windows persists as the LSA secret 'DefaultPassword'.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $w = Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon' -ErrorAction SilentlyContinue
        [PSCustomObject]@{
          AutoAdminLogon = $w.AutoAdminLogon
          DefaultUserName = $w.DefaultUserName
          HasDefaultPassword = [bool]$w.DefaultPassword
        } | Format-List
      elevation_required: false

  - name: "LSA Secrets Dump via reg save (SECURITY hive)"
    auto_generated_guid: e4f4a5b5c5d5e5f5a6b6c6d6e6f6a7b7
    description: |
      Saves the SECURITY (and SYSTEM) registry hives, the offline source used
      by tools such as secretsdump.py and Mimikatz lsadump::secrets to decrypt
      LSA secrets. Requires SYSTEM/administrator privileges.
    supported_platforms:
      - windows
    input_arguments:
      output_dir:
        description: Directory to write the saved hives to
        type: path
        default: "%TEMP%"
    executor:
      name: command_prompt
      command: |
        reg save HKLM\SECURITY "#{output_dir}\security.save" /y
        reg save HKLM\SYSTEM "#{output_dir}\system.save" /y
      cleanup_command: |
        del "#{output_dir}\security.save" /q >nul 2>&1
        del "#{output_dir}\system.save" /q >nul 2>&1
      elevation_required: true

  - name: "Object Access Auditing Status (LSA secret access visibility)"
    auto_generated_guid: f5a5b5c5d5e5f5a6b6c6d6e6f6a7b7c7
    description: |
      Reports whether object-access auditing is configured so that attempts to
      read protected LSA secrets would be logged.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        auditpol /get /subcategory:"Other Object Access Events"
      elevation_required: true
