attack_technique: T1219
display_name: "Remote Access Software"
tactic: Command and Control
atomic_tests:
  - name: "Remote Access Tool Detection"
    auto_generated_guid: b0b0c0d0e0f0a1b1c1d1e1f1a2b2c2d2
    description: |
      Detects installed remote access tools on the system.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $ratTools = @("TeamViewer","AnyDesk","VNC","RealVNC","TightVNC","UltraVNC","ScreenConnect","ConnectWise","LogMeIn","GoToAssist","Splashtop","Ammyy","RemotePC","Radmin","BeyondTrust","Bomgar","DameWare","NetSupport","SimpleHelp","RustDesk","MeshAgent")
        Write-Output "--- Installed Remote Access Software ---"
        foreach ($tool in $ratTools) {
          $svc = Get-Service -DisplayName "*$tool*" -ErrorAction SilentlyContinue
          $proc = Get-Process -Name "*$tool*" -ErrorAction SilentlyContinue
          $reg = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*" -ErrorAction SilentlyContinue | Where-Object { $_.DisplayName -like "*$tool*" }
          if ($svc -or $proc -or $reg) { Write-Output "FOUND: $tool (Service: $($svc.Count), Process: $($proc.Count), Installed: $($reg.Count))" }
        }
      elevation_required: false

  - name: "Remote Access Listening Ports"
    auto_generated_guid: c1c1d1e1f1a2b2c2d2e2f2a3b3c3d3e3
    description: |
      Checks for common remote access tool listening ports.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $ratPorts = @(@{Port=5900;Name="VNC"},@{Port=5938;Name="TeamViewer"},@{Port=7070;Name="AnyDesk"},@{Port=3389;Name="RDP"},@{Port=8040;Name="ConnectWise"},@{Port=4899;Name="Radmin"},@{Port=21118;Name="RustDesk"})
        foreach ($p in $ratPorts) {
          $listener = Get-NetTCPConnection -LocalPort $p.Port -State Listen -ErrorAction SilentlyContinue
          if ($listener) { Write-Output "LISTENING: Port $($p.Port) ($($p.Name)) - PID $($listener.OwningProcess)" }
        }
      elevation_required: false
