attack_technique: T1087.002
display_name: "Account Discovery: Domain Account"
tactic: Discovery
atomic_tests:
  - name: "Enumerate Domain Users via net user /domain"
    auto_generated_guid: a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7
    description: |
      Uses net user /domain to list all domain user accounts.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        net user /domain
      elevation_required: false

  - name: "Enumerate Domain Admins via net group"
    auto_generated_guid: b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8
    description: |
      Lists members of the Domain Admins group.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        net group "Domain Admins" /domain
      elevation_required: false

  - name: "Enumerate Domain Users via PowerShell AD Module"
    auto_generated_guid: c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9
    description: |
      Uses the ActiveDirectory PowerShell module to enumerate users.
    supported_platforms:
      - windows
    dependencies:
      - description: "ActiveDirectory module must be available"
        prereq_command: "if (Get-Module -ListAvailable -Name ActiveDirectory) {exit 0} else {exit 1}"
    dependency_executor_name: powershell
    executor:
      name: powershell
      command: |
        Get-ADUser -Filter * -Properties LastLogonDate,Enabled | Select-Object Name,SamAccountName,Enabled,LastLogonDate | Sort-Object LastLogonDate -Descending | Select-Object -First 50
      elevation_required: false

  - name: "Enumerate Domain Users via LDAP Query"
    auto_generated_guid: d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0
    description: |
      Performs LDAP query via DirectorySearcher to enumerate domain users.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $searcher = [adsisearcher]"(objectCategory=person)"
        $searcher.PropertiesToLoad.AddRange(@("samaccountname","displayname","mail"))
        $searcher.SizeLimit = 50
        $searcher.FindAll() | ForEach-Object { $_.Properties["samaccountname"] }
      elevation_required: false

  - name: "Enumerate Service Accounts"
    auto_generated_guid: e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1
    description: |
      Searches for domain service accounts by naming convention.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $searcher = [adsisearcher]"(&(objectCategory=person)(|(samaccountname=svc*)(samaccountname=service*)))"
        $searcher.FindAll() | ForEach-Object { $_.Properties["samaccountname"] }
      elevation_required: false
