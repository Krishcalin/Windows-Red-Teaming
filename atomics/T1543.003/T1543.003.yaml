attack_technique: T1543.003
display_name: "Create or Modify System Process: Windows Service"
tactic: Persistence
atomic_tests:
  - name: "Create Malicious Windows Service"
    auto_generated_guid: a7a7b7c7d7e7f7a8b8c8d8e8f8a9b9c9
    description: |
      Creates a Windows service with a custom binary path.
    supported_platforms:
      - windows
    input_arguments:
      service_name:
        description: "Service name"
        type: string
        default: "AtomicTestSvc"
    executor:
      name: command_prompt
      command: |
        sc create #{service_name} binPath= "cmd.exe /c echo Atomic Service" type= own start= auto displayname= "Atomic Red Team Test Service"
        sc qc #{service_name}
      cleanup_command: |
        sc stop #{service_name} >nul 2>&1
        sc delete #{service_name} >nul 2>&1
      elevation_required: true

  - name: "Modify Existing Service Binary Path"
    auto_generated_guid: b8b8c8d8e8f8a9b9c9d9e9f9a0b0c0d0
    description: |
      Modifies an existing service's binary path. Uses a test service.
    supported_platforms:
      - windows
    input_arguments:
      service_name:
        description: "Service to create for testing"
        type: string
        default: "AtomicModSvc"
    executor:
      name: command_prompt
      command: |
        sc create #{service_name} binPath= "cmd.exe /c echo original" type= own start= demand
        sc config #{service_name} binPath= "cmd.exe /c echo MODIFIED"
        sc qc #{service_name}
      cleanup_command: |
        sc stop #{service_name} >nul 2>&1
        sc delete #{service_name} >nul 2>&1
      elevation_required: true

  - name: "Service Enumeration for Weak Permissions"
    auto_generated_guid: c9c9d9e9f9a0b0c0d0e0f0a1b1c1d1e1
    description: |
      Enumerates services checking for weak permissions and
      modifiable service binaries.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-CimInstance Win32_Service | Where-Object { $_.StartMode -eq 'Auto' -and $_.State -eq 'Running' } | Select-Object Name,DisplayName,PathName,StartName | Sort-Object Name
      elevation_required: false
