attack_technique: T1547.001
display_name: "Boot or Logon Autostart Execution: Registry Run Keys"
tactic: Persistence
atomic_tests:
  - name: "Add Registry Run Key (HKCU)"
    auto_generated_guid: a1b1c1d1e1f1a2b2c2d2e2f2a3b3c3d3
    description: |
      Adds a Run key to HKCU for current user persistence.
    supported_platforms:
      - windows
    input_arguments:
      entry_name:
        description: "Registry value name"
        type: string
        default: "AtomicTest"
      command:
        description: "Command to persist"
        type: string
        default: "cmd.exe /c echo Atomic Test > %TEMP%\\atomic_runkey.txt"
    executor:
      name: command_prompt
      command: |
        reg add "HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Run" /v #{entry_name} /t REG_SZ /d "#{command}" /f
        reg query "HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Run" /v #{entry_name}
      cleanup_command: |
        reg delete "HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Run" /v #{entry_name} /f >nul 2>&1
      elevation_required: false

  - name: "Add Registry Run Key (HKLM)"
    auto_generated_guid: b2b2c2d2e2f2a3b3c3d3e3f3a4b4c4d4
    description: |
      Adds a Run key to HKLM for machine-wide persistence.
    supported_platforms:
      - windows
    input_arguments:
      entry_name:
        description: "Registry value name"
        type: string
        default: "AtomicTestHKLM"
    executor:
      name: command_prompt
      command: |
        reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run" /v #{entry_name} /t REG_SZ /d "cmd.exe /c echo test" /f
        reg query "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run" /v #{entry_name}
      cleanup_command: |
        reg delete "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run" /v #{entry_name} /f >nul 2>&1
      elevation_required: true

  - name: "Add RunOnce Key for One-Time Execution"
    auto_generated_guid: c3c3d3e3f3a4b4c4d4e4f4a5b5c5d5e5
    description: |
      Adds a RunOnce key that executes once at next logon.
    supported_platforms:
      - windows
    input_arguments:
      entry_name:
        description: "Registry value name"
        type: string
        default: "AtomicRunOnce"
    executor:
      name: command_prompt
      command: |
        reg add "HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce" /v #{entry_name} /t REG_SZ /d "cmd.exe /c echo RunOnce executed" /f
      cleanup_command: |
        reg delete "HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce" /v #{entry_name} /f >nul 2>&1
      elevation_required: false

  - name: "Enumerate Existing Run Keys"
    auto_generated_guid: d4d4e4f4a5b5c5d5e5f5a6b6c6d6e6f6
    description: |
      Enumerates all existing Run and RunOnce keys.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $paths = @(
          "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Run",
          "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce",
          "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Run",
          "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce",
          "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Run"
        )
        foreach ($p in $paths) { Write-Output "`n--- $p ---"; Get-ItemProperty $p -ErrorAction SilentlyContinue | Format-List }
      elevation_required: false
