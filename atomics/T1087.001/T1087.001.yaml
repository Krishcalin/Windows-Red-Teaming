attack_technique: T1087.001
display_name: "Account Discovery: Local Account"
tactic: Discovery
atomic_tests:
  - name: "Enumerate Local Users via net user"
    auto_generated_guid: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
    description: |
      Uses net user to list all local user accounts.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        net user
      elevation_required: false

  - name: "Enumerate Local Users via PowerShell"
    auto_generated_guid: b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7
    description: |
      Uses Get-LocalUser to enumerate local accounts with status.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-LocalUser | Select-Object Name,Enabled,LastLogon,PasswordLastSet,Description
      elevation_required: false

  - name: "Enumerate Local Users via WMI"
    auto_generated_guid: c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8
    description: |
      Uses WMI Win32_UserAccount class to discover local accounts.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        wmic useraccount where "LocalAccount=TRUE" get Name,SID,Status,Disabled /format:list
      elevation_required: false

  - name: "Enumerate Specific User Details"
    auto_generated_guid: d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9
    description: |
      Enumerates details of a specific user account.
    supported_platforms:
      - windows
    input_arguments:
      user_name:
        description: "Username to enumerate"
        type: string
        default: "Administrator"
    executor:
      name: command_prompt
      command: |
        net user #{user_name}
      elevation_required: false
