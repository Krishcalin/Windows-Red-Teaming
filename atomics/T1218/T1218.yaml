attack_technique: T1218
display_name: "System Binary Proxy Execution — MSHTML Bypass (CVE-2026-21513)"
tactic: Defense Evasion
atomic_tests:
  - name: "Check MSHTML DLL Version"
    auto_generated_guid: cc218001-0001-0001-0001-000000000001
    description: |
      Enumerates mshtml.dll version and signature. An unpatched version is
      vulnerable to CVE-2026-21513 which bypasses security warnings for
      remote code execution.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $dll = "$env:SystemRoot\System32\mshtml.dll"
        if (Test-Path $dll) {
          $info = (Get-Item $dll).VersionInfo
          $sig = Get-AuthenticodeSignature $dll
          Write-Output "File: $dll"
          Write-Output "FileVersion: $($info.FileVersion)"
          Write-Output "ProductVersion: $($info.ProductVersion)"
          Write-Output "Signature: $($sig.Status)"
          Write-Output "Signer: $($sig.SignerCertificate.Subject)"
        }
      elevation_required: false

  - name: "Check IE/MSHTML Security Zone Configuration"
    auto_generated_guid: cc218001-0001-0001-0001-000000000002
    description: |
      Checks Internet Explorer security zone settings that affect MSHTML
      behavior. ActiveX and scripting controls in the Internet zone are
      relevant to CVE-2026-21513 exploitation.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        echo === Internet Zone (3) ActiveX ===
        reg query "HKCU\Software\Microsoft\Windows\CurrentVersion\Internet Settings\Zones\3" /v 1201 2>nul
        echo === Internet Zone (3) Scripting ===
        reg query "HKCU\Software\Microsoft\Windows\CurrentVersion\Internet Settings\Zones\3" /v 1400 2>nul
        echo === Mark of the Web ===
        reg query "HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\Attachments" /v SaveZoneInformation 2>nul
      elevation_required: false

  - name: "Enumerate mshta.exe Usage History"
    auto_generated_guid: cc218001-0001-0001-0001-000000000003
    description: |
      Checks for recent mshta.exe process execution. mshta.exe is the primary
      binary for MSHTML-based attacks and is commonly abused in CVE-2026-21513
      exploitation chains.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Write-Output "=== mshta.exe process check ==="
        Get-Process -Name mshta -ErrorAction SilentlyContinue |
          Select-Object Id, ProcessName, Path, StartTime | Format-List
        Write-Output "`n=== Recent mshta.exe events (Sysmon Event ID 1) ==="
        Get-WinEvent -FilterHashtable @{
          LogName='Microsoft-Windows-Sysmon/Operational'; Id=1;
          StartTime=(Get-Date).AddDays(-7)
        } -MaxEvents 10 -ErrorAction SilentlyContinue |
        Where-Object { $_.Message -match 'mshta' } |
        Format-List TimeCreated, Message
      elevation_required: false

  - name: "Check Office OLE Security Configuration"
    auto_generated_guid: cc218001-0001-0001-0001-000000000004
    description: |
      Checks Office OLE packager prompt settings. Disabled prompts enable
      silent OLE object execution, which is related to the CVE-2026-21514
      attack vector.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        echo === Office 2016+ OLE Packager Prompt ===
        reg query "HKCU\Software\Microsoft\Office\16.0\Common\Security" /v PackagerPrompt 2>nul
        echo === Office Macro Security ===
        reg query "HKCU\Software\Microsoft\Office\16.0\Word\Security" /v VBAWarnings 2>nul
        reg query "HKCU\Software\Microsoft\Office\16.0\Excel\Security" /v VBAWarnings 2>nul
      elevation_required: false

  - name: "Check February 2026 Patch Status for CVE-2026-21513"
    auto_generated_guid: cc218001-0001-0001-0001-000000000005
    description: |
      Verifies whether the February 2026 Patch Tuesday update has been installed,
      which remediates CVE-2026-21513 (MSHTML security feature bypass).
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $patches = Get-HotFix | Where-Object { $_.InstalledOn -ge '2026-02-01' }
        if ($patches) {
          Write-Output "[+] February 2026+ patches installed:"
          $patches | Format-Table HotFixID, InstalledOn, Description
        } else {
          Write-Output "[!] VULNERABLE: No patches from February 2026 or later found"
          Write-Output "[!] System is likely vulnerable to CVE-2026-21513 (MSHTML bypass)"
        }
      elevation_required: false
