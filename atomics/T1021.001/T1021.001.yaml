attack_technique: T1021.001
display_name: "Remote Services: Remote Desktop Protocol"
tactic: Lateral Movement
atomic_tests:
  - name: "RDP Configuration Audit"
    auto_generated_guid: f2f2a3b3c3d3e3f3a4b4c4d4e4f4a5b5
    description: |
      Checks RDP configuration including NLA, encryption, and access settings.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $rdp = Get-ItemProperty 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server' -ErrorAction SilentlyContinue
        Write-Output "RDP Enabled: $(if ($rdp.fDenyTSConnections -eq 0) {'Yes'} else {'No'})"
        $nla = Get-ItemProperty 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -ErrorAction SilentlyContinue
        Write-Output "NLA Required: $(if ($nla.UserAuthentication -eq 1) {'Yes'} else {'No'})"
        Write-Output "Security Layer: $($nla.SecurityLayer)"
        Write-Output "Min Encryption: $($nla.MinEncryptionLevel)"
        Get-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue | Select-Object DisplayName,Enabled,Direction,Action
      elevation_required: false

  - name: "Enable RDP via Registry"
    auto_generated_guid: a3a3b3c3d3e3f3a4b4c4d4e4f4a5b5c5
    description: |
      Enables RDP by modifying the fDenyTSConnections registry value.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        netsh advfirewall firewall set rule group="Remote Desktop" new enable=yes
      cleanup_command: |
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 1 /f
        netsh advfirewall firewall set rule group="Remote Desktop" new enable=no
      elevation_required: true

  - name: "Disable Network Level Authentication"
    auto_generated_guid: b4b4c4d4e4f4a5b5c5d5e5f5a6b6c6d6
    description: |
      Disables NLA requirement for RDP connections.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" /v UserAuthentication /t REG_DWORD /d 0 /f
      cleanup_command: |
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" /v UserAuthentication /t REG_DWORD /d 1 /f
      elevation_required: true

  - name: "RDP Session Enumeration"
    auto_generated_guid: c5c5d5e5f5a6b6c6d6e6f6a7b7c7d7e7
    description: |
      Enumerates existing RDP sessions on the system.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        query session
        query user
        qwinsta /server:localhost
      elevation_required: false
