attack_technique: T1615
display_name: "Group Policy Discovery"
tactic: Discovery
atomic_tests:
  - name: "Group Policy Enumeration via gpresult"
    auto_generated_guid: b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0
    description: |
      Uses gpresult to display applied group policies.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        gpresult /r
      elevation_required: false

  - name: "Group Policy Objects via PowerShell"
    auto_generated_guid: c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1
    description: |
      Enumerates GPOs applied to the system using PowerShell.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-GPO -All -ErrorAction SilentlyContinue | Select-Object DisplayName,GpoStatus,CreationTime,ModificationTime | Sort-Object ModificationTime -Descending
      elevation_required: false

  - name: "SYSVOL Policy File Discovery"
    auto_generated_guid: d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2
    description: |
      Searches SYSVOL for Group Policy Preference files containing credentials.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $domain = (Get-CimInstance Win32_ComputerSystem).Domain
        Get-ChildItem -Path "\\$domain\SYSVOL" -Recurse -Include Groups.xml,Services.xml,Scheduledtasks.xml,DataSources.xml,Drives.xml,Printers.xml -ErrorAction SilentlyContinue | Select-Object FullName,LastWriteTime
      elevation_required: false
