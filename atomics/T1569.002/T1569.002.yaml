attack_technique: T1569.002
display_name: "System Services: Service Execution"
tactic: Execution
atomic_tests:
  - name: "Service Creation and Execution via sc.exe"
    auto_generated_guid: b0b1b2b3c4c5d6d7e8e9f0f1a2a3b4b5
    description: |
      Creates and starts a Windows service using sc.exe.
    supported_platforms:
      - windows
    input_arguments:
      service_name:
        description: "Name of the service to create"
        type: string
        default: "AtomicTestService"
    executor:
      name: command_prompt
      command: |
        sc create #{service_name} binPath= "cmd.exe /c whoami > %TEMP%\svc_test.txt" type= own start= demand
        sc start #{service_name}
        timeout /t 3 >nul
        type %TEMP%\svc_test.txt 2>nul
      cleanup_command: |
        sc stop #{service_name} >nul 2>&1
        sc delete #{service_name} >nul 2>&1
        del /f %TEMP%\svc_test.txt >nul 2>&1
      elevation_required: true

  - name: "PsExec-Style Service Execution"
    auto_generated_guid: c1c2c3c4d5d6e7e8f9f0a1a2b3b4c5c6
    description: |
      Simulates PsExec-style service execution via PowerShell.
    supported_platforms:
      - windows
    input_arguments:
      service_name:
        description: "Service name"
        type: string
        default: "AtomicPsExecSvc"
    executor:
      name: powershell
      command: |
        New-Service -Name "#{service_name}" -BinaryPathName "cmd.exe /c whoami" -StartupType Manual -ErrorAction SilentlyContinue
        Get-Service -Name "#{service_name}" -ErrorAction SilentlyContinue | Select-Object Name,Status,StartType
      cleanup_command: |
        Stop-Service -Name "#{service_name}" -Force -ErrorAction SilentlyContinue
        sc.exe delete "#{service_name}" >$null 2>&1
      elevation_required: true

  - name: "Enumerate Services with Unquoted Paths"
    auto_generated_guid: d2d3d4d5e6e7f8f9a0a1b2b3c4c5d6d7
    description: |
      Discovers services with unquoted paths vulnerable to hijacking.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-CimInstance Win32_Service | Where-Object { $_.PathName -notlike '"*' -and $_.PathName -like '* *' -and $_.PathName -notlike 'C:\Windows\*' } | Select-Object Name,PathName,StartMode,State
      elevation_required: false
