attack_technique: T1047
display_name: "Windows Management Instrumentation"
tactic: Execution
atomic_tests:
  - name: "WMI Process Execution"
    auto_generated_guid: f2f3f4f5a6a7b8b9c0c1d2d3e4e5f6f7
    description: |
      Uses wmic to execute a process on the local system.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        wmic process call create "cmd.exe /c whoami > %TEMP%\wmi_test.txt"
        timeout /t 2 >nul
        type %TEMP%\wmi_test.txt
      cleanup_command: |
        del /f %TEMP%\wmi_test.txt >nul 2>&1
      elevation_required: true

  - name: "WMI Reconnaissance Queries"
    auto_generated_guid: a3a4a5a6b7b8c9c0d1d2e3e4f5f6a7a8
    description: |
      Executes common WMI queries used for reconnaissance.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        wmic os get Caption,Version,BuildNumber /format:list
        wmic process list brief
        wmic service where "State='Running'" get Name,PathName /format:list
        wmic startup list full
      elevation_required: false

  - name: "WMI Remote Process Creation"
    auto_generated_guid: b4b5b6b7c8c9d0d1e2e3f4f5a6a7b8b9
    description: |
      Uses WMI via PowerShell to create a remote process.
    supported_platforms:
      - windows
    input_arguments:
      target_host:
        description: "Target computer name or IP"
        type: string
        default: "localhost"
    executor:
      name: powershell
      command: |
        Invoke-WmiMethod -Class Win32_Process -Name Create -ArgumentList "cmd.exe /c whoami" -ComputerName #{target_host}
      elevation_required: true

  - name: "WMI Event Subscription Check"
    auto_generated_guid: c5c6c7c8d9d0e1e2f3f4a5a6b7b8c9c0
    description: |
      Enumerates existing WMI event subscriptions (persistence mechanism).
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-CimInstance -Namespace root/subscription -ClassName __EventFilter -ErrorAction SilentlyContinue
        Get-CimInstance -Namespace root/subscription -ClassName __EventConsumer -ErrorAction SilentlyContinue
        Get-CimInstance -Namespace root/subscription -ClassName __FilterToConsumerBinding -ErrorAction SilentlyContinue
      elevation_required: true
