attack_technique: T1529
display_name: "System Shutdown/Reboot"
tactic: Impact
atomic_tests:
  - name: "System Shutdown Command (Dry Run)"
    auto_generated_guid: b4b4c4d4e4f4a5b5c5d5e5f5a6b6c6d6
    description: |
      Tests shutdown command capability. Uses /t 9999 and
      immediately aborts to verify the capability exists without
      actually shutting down.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        shutdown /s /t 9999 /c "Atomic Red Team Test - will be aborted"
        shutdown /a
        echo Shutdown capability verified and aborted.
      elevation_required: true

  - name: "Restart Computer via PowerShell (Dry Run)"
    auto_generated_guid: c5c5d5e5f5a6b6c6d6e6f6a7b7c7d7e7
    description: |
      Tests restart capability via PowerShell with -WhatIf.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Restart-Computer -WhatIf
        Write-Output "Restart capability verified (WhatIf - no actual restart)"
      elevation_required: true
