attack_technique: T1560.001
display_name: "Archive Collected Data: Archive via Utility"
tactic: Collection
atomic_tests:
  - name: "Archive Data via PowerShell Compress-Archive"
    auto_generated_guid: b6b6c6d6e6f6a7b7c7d7e7f7a8b8c8d8
    description: |
      Uses PowerShell to compress collected data into a zip archive.
    supported_platforms:
      - windows
    input_arguments:
      source_path:
        description: "Directory to archive"
        type: path
        default: "%USERPROFILE%\\Documents"
      archive_path:
        description: "Output archive path"
        type: path
        default: "%TEMP%\\collected_data.zip"
    executor:
      name: powershell
      command: |
        Compress-Archive -Path "#{source_path}" -DestinationPath "#{archive_path}" -Force -ErrorAction SilentlyContinue
        if (Test-Path "#{archive_path}") { Write-Output "Archive created: #{archive_path} ($('{0:N2}' -f ((Get-Item '#{archive_path}').Length/1MB)) MB)" }
      cleanup_command: |
        Remove-Item "#{archive_path}" -Force -ErrorAction SilentlyContinue
      elevation_required: false

  - name: "Archive Data via tar (Windows 10+)"
    auto_generated_guid: c7c7d7e7f7a8b8c8d8e8f8a9b9c9d9e9
    description: |
      Uses built-in tar command (Windows 10 1803+) to create archive.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        tar -cf %TEMP%\atomic_archive.tar -C %USERPROFILE% Documents 2>nul
        if exist %TEMP%\atomic_archive.tar echo Archive created: %TEMP%\atomic_archive.tar
      cleanup_command: |
        del /f %TEMP%\atomic_archive.tar >nul 2>&1
      elevation_required: false
