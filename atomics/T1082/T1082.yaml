attack_technique: T1082
display_name: "System Information Discovery"
tactic: Discovery
atomic_tests:
  - name: "System Information Discovery via systeminfo"
    auto_generated_guid: a0f7e4b1c2d3e4f5a6b7c8d9e0f1a2b3
    description: |
      Executes systeminfo to gather OS version, hotfixes, network
      configuration, and hardware details.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        systeminfo
      elevation_required: false

  - name: "System Information via WMI"
    auto_generated_guid: b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6
    description: |
      Uses WMI to enumerate operating system details including
      build number, service pack, and registered user.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        wmic os get Caption,Version,BuildNumber,OSArchitecture,RegisteredUser /format:list
      elevation_required: false

  - name: "System Information via PowerShell Get-ComputerInfo"
    auto_generated_guid: c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7
    description: |
      Uses PowerShell Get-ComputerInfo cmdlet for comprehensive
      system enumeration including BIOS, OS, and hardware.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-ComputerInfo -Property OsName,OsVersion,OsBuildNumber,OsArchitecture,OsHotFixes,CsName,CsDomain,CsModel,BiosManufacturer,BiosVersion
      elevation_required: false

  - name: "Hostname Discovery"
    auto_generated_guid: d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8
    description: |
      Retrieves the hostname using multiple methods commonly used
      by threat actors for target identification.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        hostname
        echo %COMPUTERNAME%
        wmic computersystem get Name /format:list
      elevation_required: false

  - name: "Installed Hotfix Enumeration"
    auto_generated_guid: e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9
    description: |
      Enumerates installed hotfixes to identify missing patches.
      Adversaries use this to find exploitable vulnerabilities.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-HotFix | Select-Object HotFixID,InstalledOn,Description | Sort-Object InstalledOn -Descending
      elevation_required: false

  - name: "Environment Variables Enumeration"
    auto_generated_guid: f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0
    description: |
      Enumerates environment variables that may reveal installed
      software paths, usernames, and system configuration.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        set
      elevation_required: false

  - name: "Virtualization and Hypervisor Detection"
    auto_generated_guid: a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1
    description: |
      Checks for virtualization indicators using WMI. Adversaries
      use this to detect sandbox environments.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-CimInstance -ClassName Win32_ComputerSystem | Select-Object Manufacturer,Model,HypervisorPresent
        Get-CimInstance -ClassName Win32_BIOS | Select-Object SerialNumber,Manufacturer,Version
      elevation_required: false

  - name: "Device Guard and Credential Guard Status"
    auto_generated_guid: b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2
    description: |
      Enumerates Device Guard and Credential Guard configuration
      to assess VBS-based protection status.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-CimInstance -ClassName Win32_DeviceGuard -Namespace root/Microsoft/Windows/DeviceGuard -ErrorAction SilentlyContinue | Select-Object AvailableSecurityProperties,SecurityServicesConfigured,SecurityServicesRunning,VirtualizationBasedSecurityStatus
      elevation_required: false

  - name: "TPM and Secure Boot Status"
    auto_generated_guid: c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3
    description: |
      Checks TPM and Secure Boot status. Useful for assessing
      boot-level protections and BitLocker readiness.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-Tpm -ErrorAction SilentlyContinue | Select-Object TpmPresent,TpmReady,TpmEnabled
        try { Confirm-SecureBootUEFI } catch { Write-Output "SecureBoot: Not supported or unavailable" }
      elevation_required: true

  - name: "Windows Defender Status Check"
    auto_generated_guid: d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4
    description: |
      Enumerates Windows Defender AV status including real-time
      protection, definitions, and scan results.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-MpComputerStatus -ErrorAction SilentlyContinue | Select-Object AntivirusEnabled,RealTimeProtectionEnabled,AntivirusSignatureLastUpdated,QuickScanStartTime
      elevation_required: false
