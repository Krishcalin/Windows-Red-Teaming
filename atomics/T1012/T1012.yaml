attack_technique: T1012
display_name: "Query Registry"
tactic: Discovery
atomic_tests:
  - name: "Query Registry Run Keys"
    auto_generated_guid: b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8
    description: |
      Queries registry Run keys for persistence mechanisms.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        reg query HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run
        reg query HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Run
        reg query HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce
      elevation_required: false

  - name: "Query Installed Software via Registry"
    auto_generated_guid: c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9
    description: |
      Enumerates installed software from the Uninstall registry key.
    supported_platforms:
      - windows
    executor:
      name: powershell
      command: |
        Get-ItemProperty HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\* | Select-Object DisplayName,DisplayVersion,Publisher,InstallDate | Where-Object { $_.DisplayName } | Sort-Object DisplayName
      elevation_required: false

  - name: "Query Windows Defender Registry Settings"
    auto_generated_guid: d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0
    description: |
      Enumerates Windows Defender configuration from registry.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        reg query "HKLM\SOFTWARE\Policies\Microsoft\Windows Defender" /s
        reg query "HKLM\SOFTWARE\Microsoft\Windows Defender\Real-Time Protection" /s
      elevation_required: false
