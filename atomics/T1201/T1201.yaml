attack_technique: T1201
display_name: "Password Policy Discovery"
tactic: Discovery
atomic_tests:
  - name: "Local Password Policy via net accounts"
    auto_generated_guid: e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5
    description: |
      Uses net accounts to display local password policy.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        net accounts
      elevation_required: false

  - name: "Domain Password Policy"
    auto_generated_guid: f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6
    description: |
      Enumerates domain password policy settings.
    supported_platforms:
      - windows
    executor:
      name: command_prompt
      command: |
        net accounts /domain
      elevation_required: false

  - name: "Fine-Grained Password Policy via PowerShell"
    auto_generated_guid: a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7
    description: |
      Enumerates fine-grained password policies via AD module.
    supported_platforms:
      - windows
    dependencies:
      - description: "ActiveDirectory module must be available"
        prereq_command: "if (Get-Module -ListAvailable -Name ActiveDirectory) {exit 0} else {exit 1}"
    dependency_executor_name: powershell
    executor:
      name: powershell
      command: |
        Get-ADDefaultDomainPasswordPolicy
        Get-ADFineGrainedPasswordPolicy -Filter * -ErrorAction SilentlyContinue
      elevation_required: false
